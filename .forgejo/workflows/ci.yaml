on: [push, pull_request, workflow_dispatch]

jobs:
  ci-build:
    runs-on: docker
    container:
      image: code.phoswald.ch/philip/builder:latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-
      - run: mkdir -p ~/.m2 &&  echo "${{ secrets.M2_SETTINGS }}" > ~/.m2/settings.xml
      - run: |
          BRANCH="${{ github.ref_name }}"
          if [ "$BRANCH" = "master" ]; then
            CHANGELIST="-SNAPSHOT"
          else
            SUFFIX=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')
            CHANGELIST="-${SUFFIX}-SNAPSHOT"
          fi
          mvn -B clean deploy -P docker -Dchangelist=$CHANGELIST
