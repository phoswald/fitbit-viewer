on: [push, pull_request, workflow_dispatch]

jobs:
  ci-build:
    runs-on: docker
    container:
      image: code.phoswald.ch/philip/builder:latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-
      - run: mkdir -p ~/.m2 &&  echo "${{ secrets.M2_SETTINGS }}" > ~/.m2/settings.xml
      - run: |
          GIT_BRANCH="${{ forgejo.ref_name }}"
          MAVEN_CHANGELIST=-$(date "+%Y%m%d-%H%M")
          if [ "${GIT_BRANCH}" != "master" ]; then
            MAVEN_CHANGELIST="${MAVEN_CHANGELIST}"-$(echo "${GIT_BRANCH}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          fi
          mvn -B clean deploy -P docker -Dchangelist="${MAVEN_CHANGELIST}" 
