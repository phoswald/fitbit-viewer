# JDBC and JPA: Use PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${FITBIT_DATASOURCE_JDBC_URL}
quarkus.datasource.username=${FITBIT_DATASOURCE_USERNAME}
quarkus.datasource.password=${FITBIT_DATASOURCE_PASSWORD}
quarkus.hibernate-orm.database.generation=validate

# REST Client
quarkus.rest-client.fitbit-api.url=https://api.fitbit.com

# Log Levels
quarkus.log.category."com.github.phoswald.fitbit.viewer".level=DEBUG

# Application: FitBit API
app.fitbit.client-id=${FITBIT_CLIENT_ID}
app.fitbit.client-secret=${FITBIT_CLIENT_SECRET}
app.fitbit.redirect-uri=http://localhost:8080/app/oauth/callback
app.fitbit.cookie.secret=${FITBIT_COOKIE_SECRET}
