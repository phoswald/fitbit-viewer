<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fitbit Viewer</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header>
      <div class="header-brand">
        <img src="/images/fitbit-logo.svg" alt="Fitbit" class="header-logo">
        <span class="header-title">Fitbit Viewer</span>
      </div>
      <a href="/app/oauth/login" class="button">Login</a>
    </header>
    <div class="app-layout">
      <nav class="sidebar">
        <a href="/" class="nav-item active">
          <span class="nav-icon"></span>Home
        </a>
        <a href="app/pages/profile" class="nav-item">
          <span class="nav-icon"></span>Profile
        </a>
        <a href="app/pages/steps" class="nav-item">
          <span class="nav-icon"></span>Steps
        </a>
        <a href="app/pages/heartrate" class="nav-item">
          <span class="nav-icon"></span>Heart Rate
        </a>
        <a href="app/pages/cardioscore" class="nav-item">
          <span class="nav-icon"></span>Cardio Fitness
        </a>
        <a href="app/pages/azm" class="nav-item">
          <span class="nav-icon"></span>Active Zone Minutes
        </a>
        <a href="app/pages/activities" class="nav-item">
          <span class="nav-icon"></span>Activities
        </a>
      </nav>
      <main>
        <h1>Fitbit Viewer</h1>
        <p class="intro">Powered by:</p>
        <div class="logos">
          <a href="https://www.fitbit.com" target="_blank">
            <img src="images/fitbit-logo.svg" title="FitBit" alt="FitBit">
          </a>
          <a href="https://quarkus.io" target="_blank">
            <img src="images/quarkus-logo.svg" title="Quarkus" alt="Quarkus">
          </a>
          <a href="https://dev.java/" target="_blank">
            <img src="images/java-logo.svg" title="Java" alt="Java">
          </a>
          <a href="https://www.openstreetmap.org/" target="_blank">
            <img src="images/openstreetmap-logo.svg" title="OpenStreetMap" alt="OpenStreetMap">
          </a>
          <a href="https://leafletjs.com/" target="_blank">
            <img src="images/leafletjs-logo.png" title="Leaflet" alt="Leaflet">
          </a>
          <a href="https://www.docker.com" target="_blank">
            <img src="images/docker-logo.svg" title="Docker" alt="Docker">
          </a>
          <a href="https://www.linux.org" target="_blank">
            <img src="images/linux-logo.svg" title="Linux" alt="Linux">
          </a>
          <a href="https://code.phoswald.ch/philip/fitbit-viewer" target="_blank">
            <img src="images/forgejo-logo.svg" title="Forgejo" alt="Forgejo">
          </a>
          <a href="https://github.com/phoswald/fitbit-viewer" target="_blank">
            <img src="images/github-logo.svg" title="GitHub" alt="GitHub">
          </a>
          <a href="https://claude.ai/" target="_blank">
            <img src="images/claude-logo.svg" title="Claude" alt="Claude">
          </a>
        </div>
      </main>
    </div>
  </body>
</html>
