<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fitbit Viewer</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header>
      <div class="my-titlebar-brand">
        <img src="/images/fitbit-logo.svg" alt="Fitbit" class="my-titlebar-logo">
        <span class="my-titlebar-title">Fitbit Viewer</span>
      </div>
      <a href="/app/oauth/login" class="my-button">Login</a>
    </header>
    <div class="my-app-layout">
      <nav>
        <a href="/" class="my-active">
          <span class="my-sidebar-icon"></span>Home
        </a>
        <a href="app/pages/profile">
          <span class="my-sidebar-icon"></span>Profile
        </a>
        <a href="app/pages/steps">
          <span class="my-sidebar-icon"></span>Steps
        </a>
        <a href="app/pages/heartrate">
          <span class="my-sidebar-icon"></span>Heart Rate
        </a>
        <a href="app/pages/cardioscore">
          <span class="my-sidebar-icon"></span>Cardio Fitness
        </a>
        <a href="app/pages/azm">
          <span class="my-sidebar-icon"></span>Active Zone Minutes
        </a>
        <a href="app/pages/activities">
          <span class="my-sidebar-icon"></span>Activities
        </a>
      </nav>
      <main>
        <h1>Fitbit Viewer</h1>
        <p>Powered by:</p>
        <p>
          <a href="https://www.fitbit.com" target="_blank" rel="noopener noreferrer" class="my-logo">
            <img src="images/fitbit-logo.svg" title="FitBit" alt="FitBit">
          </a>
          <a href="https://quarkus.io" target="_blank" rel="noopener noreferrer" class="my-logo">
            <img src="images/quarkus-logo.svg" title="Quarkus" alt="Quarkus">
          </a>
          <a href="https://dev.java/" target="_blank" rel="noopener noreferrer" class="my-logo">
            <img src="images/java-logo.svg" title="Java" alt="Java">
          </a>
          <a href="https://www.openstreetmap.org/" target="_blank" rel="noopener noreferrer" class="my-logo">
            <img src="images/openstreetmap-logo.svg" title="OpenStreetMap" alt="OpenStreetMap">
          </a>
          <a href="https://leafletjs.com/" target="_blank" rel="noopener noreferrer" class="my-logo">
            <img src="images/leafletjs-logo.png" title="Leaflet" alt="Leaflet">
          </a>
          <a href="https://www.docker.com" target="_blank" rel="noopener noreferrer" class="my-logo">
            <img src="images/docker-logo.svg" title="Docker" alt="Docker">
          </a>
          <a href="https://www.linux.org" target="_blank" rel="noopener noreferrer" class="my-logo">
            <img src="images/linux-logo.svg" title="Linux" alt="Linux">
          </a>
          <a href="https://code.phoswald.ch/philip/fitbit-viewer" target="_blank" rel="noopener noreferrer" class="my-logo">
            <img src="images/forgejo-logo.svg" title="Forgejo" alt="Forgejo">
          </a>
          <a href="https://github.com/phoswald/fitbit-viewer" target="_blank" rel="noopener noreferrer" class="my-logo">
            <img src="images/github-logo.svg" title="GitHub" alt="GitHub">
          </a>
          <a href="https://claude.ai/" target="_blank" rel="noopener noreferrer" class="my-logo">
            <img src="images/claude-logo.svg" title="Claude" alt="Claude">
          </a>
        </p>
      </main>
    </div>
  </body>
</html>
